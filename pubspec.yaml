name: solidsteps_frontend
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+17

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  
  
  cupertino_icons: ^1.0.8
  fl_chart: ^0.71.0
  http: ^1.6.0
  shared_preferences: ^2.5.5
  image_picker: ^1.2.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1
  intl: ^0.20.2
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4


flutter:


  uses-material-design: true


  assets:
    - assets/images/splash_screen/
    - assets/images/bottom_nev_image/
    - assets/images/App_features/
    - shorebird.yaml



flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/updatelogo.jpg.png"
  remove_alpha_ios: true
  min_sdk_android: 21
